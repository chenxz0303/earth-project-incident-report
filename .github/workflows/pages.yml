name: 测试并部署 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 获取仓库内容
        uses: actions/checkout@v6
      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: 检查数据与链接
        run: npm test

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: 获取仓库内容
        uses: actions/checkout@v6
      - name: 配置 Pages
        uses: actions/configure-pages@v5
      - name: 打包静态网站
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - name: 部署 Pages
        id: deployment
        uses: actions/deploy-pages@v4
