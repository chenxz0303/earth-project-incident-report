<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4efe6">
  <meta name="robots" content="noindex">
  <title>章节阅读 · 地球项目事故调查报告</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="reader-page">
  <header class="site-header reader-header">
    <a class="back-link" href="./#catalog-title">← 返回目录</a>
    <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换日间或夜间模式">夜间</button>
  </header>

  <main class="reader-shell">
    <article id="chapter" class="chapter-article" aria-live="polite">
      <p class="loading">正在读取章节…</p>
    </article>
    <nav class="chapter-nav" aria-label="章节导航">
      <a id="prev-chapter" class="nav-button is-disabled" aria-disabled="true">上一章</a>
      <a class="nav-button" href="./#catalog-title">返回目录</a>
      <a id="next-chapter" class="nav-button is-disabled" aria-disabled="true">下一章</a>
    </nav>
  </main>

  <script src="assets/common.js"></script>
  <script src="assets/reader.js"></script>
</body>
</html>
